name: platform-todo

x-db-env-task: &db-env-task
  DATABASE_URL: postgres://${DB_TASK_SVC_USER}:${DB_TASK_SVC_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DATABASE_URL_SERVICE: postgres://${DB_SERVICE_USER}:${DB_SERVICE_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DB_PRODUCT_SCOPED_LOGIN: "true"

# See docker-compose.yml for the cross-repo networking note (not solved here).
# These consume prebuilt images shipped to the server.

services:
  tasks-service:
    image: crm-tasks-service
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${TASKS_SERVICE_PORT}
      <<: *db-env-task
    expose:
      - "${TASKS_SERVICE_PORT}"

  todo-web:
    image: crm-todo-web
    restart: unless-stopped
    env_file: .env
    environment:
      API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
    ports:
      - "3003:3003"
