name: crm

# ── Shared environment blocks (YAML anchors) ─────────────────────────────────
# All variables are read from .env — change DB_NAME, passwords, ports, etc. there.
x-db-env: &db-env
  DATABASE_URL: postgres://${DB_LEAD_SVC_USER}:${DB_LEAD_SVC_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DATABASE_URL_TENANT: postgres://${DB_TENANT_SVC_USER}:${DB_TENANT_SVC_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DATABASE_URL_SERVICE: postgres://${DB_SERVICE_USER}:${DB_SERVICE_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}

# Per-product DB logins (P1.2/D8) — read/write only their own schema + read-only
# iam/entity/geo (db_scripts/19_init-per-product-db-grants.sql). DB_PRODUCT_SCOPED_LOGIN
# tells @platform/db to skip SET ROLE app_user, which would otherwise undo the isolation.
x-db-env-lms: &db-env-lms
  DATABASE_URL: postgres://${DB_LMS_SVC_USER}:${DB_LMS_SVC_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DATABASE_URL_SERVICE: postgres://${DB_SERVICE_USER}:${DB_SERVICE_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}

# Browser-facing build args shared by all four web images (P4.3). The
# NEXT_PUBLIC_* origins bake into each bundle; override in .env to simulate the
# *.app.com subdomain topology (see the caddy service).
x-web-public-args: &web-public-args
  NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${GATEWAY_PORT}}
  API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
  NEXT_PUBLIC_PASSWORD_MIN_LENGTH: ${NEXT_PUBLIC_PASSWORD_MIN_LENGTH:-12}
  NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL:-http://localhost:3000}
  NEXT_PUBLIC_LMS_URL: ${NEXT_PUBLIC_LMS_URL:-http://localhost:3001}
  NEXT_PUBLIC_HR_URL: ${NEXT_PUBLIC_HR_URL:-http://localhost:3002}
  NEXT_PUBLIC_TASK_URL: ${NEXT_PUBLIC_TASK_URL:-http://localhost:3003}
  DB_PRODUCT_SCOPED_LOGIN: "true"

x-db-env-hr: &db-env-hr
  DATABASE_URL: postgres://${DB_HR_SVC_USER}:${DB_HR_SVC_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DATABASE_URL_SERVICE: postgres://${DB_SERVICE_USER}:${DB_SERVICE_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DB_PRODUCT_SCOPED_LOGIN: "true"

x-db-env-task: &db-env-task
  DATABASE_URL: postgres://${DB_TASK_SVC_USER}:${DB_TASK_SVC_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DATABASE_URL_SERVICE: postgres://${DB_SERVICE_USER}:${DB_SERVICE_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DB_PRODUCT_SCOPED_LOGIN: "true"

services:
  postgres:
    image: postgres:18.4
    container_name: ${DB_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ${DB_DATA_PATH}:/var/lib/postgresql
      - ./db_scripts/01_init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${IDENTITY_SERVICE_PORT}
      <<: *db-env
    # Internal-only: reachable by other services over the compose network, but
    # NOT published to the host. Only the api-gateway is exposed externally.
    expose:
      - "${IDENTITY_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  leads-service:
    build:
      context: .
      dockerfile: services/leads-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${LEADS_SERVICE_PORT}
      <<: *db-env-lms
      META_SERVICE_URL: http://meta-conversion-api:${META_SERVICE_PORT}
    expose:
      - "${LEADS_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  notifications-service:
    build:
      context: .
      dockerfile: services/notifications-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${NOTIFICATIONS_SERVICE_PORT}
      <<: *db-env
    expose:
      - "${NOTIFICATIONS_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  communication-service:
    build:
      context: .
      dockerfile: services/communication-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${COMMUNICATION_SERVICE_PORT}
    expose:
      - "${COMMUNICATION_SERVICE_PORT}"

  meta-conversion-api:
    build:
      context: .
      dockerfile: services/meta-conversion-api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${META_SERVICE_PORT}
      <<: *db-env-lms
      LEADS_SERVICE_URL: http://leads-service:${LEADS_SERVICE_PORT}
    expose:
      - "${META_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      leads-service:
        condition: service_started

  admin-service:
    build:
      context: .
      dockerfile: services/admin-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${ADMIN_SERVICE_PORT}
      <<: *db-env
    expose:
      - "${ADMIN_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  hr-service:
    build:
      context: .
      dockerfile: services/hr-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${HR_SERVICE_PORT}
      <<: *db-env-hr
      # Attendance punch-photo storage (local driver → Docker volume below).
      PHOTO_STORAGE_DRIVER: ${PHOTO_STORAGE_DRIVER:-local}
      PHOTO_STORAGE_DIR: ${PHOTO_STORAGE_DIR:-/data/attendance-photos}
      PHOTO_MAX_BYTES: ${PHOTO_MAX_BYTES:-2097152}
      # Face verification — in-cluster URL bypasses the CompreFace nginx. The API
      # key and timeout come from .env (env_file above); require_face_match is an
      # opt-in per-org rule, so a blank key is fine until an org enables it.
      FACE_DRIVER: ${FACE_DRIVER:-compreface}
      COMPREFACE_URL: http://compreface-api:8080
      FACE_VERIFY_TIMEOUT_MS: ${FACE_VERIFY_TIMEOUT_MS:-5000}
    volumes:
      - attendance-photos:${PHOTO_STORAGE_DIR:-/data/attendance-photos}
    expose:
      - "${HR_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      compreface-api:
        condition: service_started

  tasks-service:
    build:
      context: .
      dockerfile: services/tasks-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${TASKS_SERVICE_PORT}
      <<: *db-env-task
    expose:
      - "${TASKS_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Face verification (CompreFace, Exadel) — INTERNAL ONLY ──────────────────
  # Self-hosted face recognition used SOLELY by hr-service for attendance punch
  # verification. It runs on its OWN postgres (compreface-postgres-db + a dedicated
  # volume) — never the app cluster. Nothing here is published to the host except,
  # optionally, the admin UI on COMPREFACE_ADMIN_UI_PORT for the one-time API-key
  # setup (ops-only — comment out its `ports` to keep it fully internal). The
  # api-gateway NEVER proxies to CompreFace. hr-service calls it at
  # http://compreface-api:8080/api/v1/... over the compose network.
  # The container_names are load-bearing: the fe nginx and compreface-api resolve
  # their upstreams (compreface-api / compreface-admin / compreface-core) by name.
  compreface-postgres-db:
    image: exadel/compreface-postgres-db:1.2.0
    container_name: compreface-postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${COMPREFACE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${COMPREFACE_POSTGRES_PASSWORD}
      POSTGRES_DB: ${COMPREFACE_POSTGRES_DB}
    volumes:
      - compreface-postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"

  compreface-core:
    image: exadel/compreface-core:1.2.0
    container_name: compreface-core
    restart: unless-stopped
    environment:
      ML_PORT: 3000
      UWSGI_PROCESSES: 2
      UWSGI_THREADS: 1
    expose:
      - "3000"

  compreface-api:
    image: exadel/compreface-api:1.2.0
    container_name: compreface-api
    restart: unless-stopped
    depends_on:
      compreface-postgres-db:
        condition: service_started
      compreface-core:
        condition: service_started
    environment:
      POSTGRES_USER: ${COMPREFACE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${COMPREFACE_POSTGRES_PASSWORD}
      POSTGRES_URL: jdbc:postgresql://compreface-postgres-db:5432/${COMPREFACE_POSTGRES_DB}
      SPRING_PROFILES_ACTIVE: dev
      API_JAVA_OPTS: -Xmx2g      # tune to host RAM
      SAVE_IMAGES_TO_DB: "true"
      CONNECTION_TIMEOUT: 10000
      READ_TIMEOUT: 60000
      MAX_FILE_SIZE: 5MB
      MAX_REQUEST_SIZE: 5MB
    expose:
      - "8080"

  compreface-admin:
    image: exadel/compreface-admin:1.2.0
    container_name: compreface-admin
    restart: unless-stopped
    depends_on:
      compreface-postgres-db:
        condition: service_started
      compreface-api:
        condition: service_started
    environment:
      POSTGRES_USER: ${COMPREFACE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${COMPREFACE_POSTGRES_PASSWORD}
      POSTGRES_URL: jdbc:postgresql://compreface-postgres-db:5432/${COMPREFACE_POSTGRES_DB}
      SPRING_PROFILES_ACTIVE: dev
      ENABLE_EMAIL_SERVER: "false"
      ADMIN_JAVA_OPTS: -Xmx1g
      MAX_FILE_SIZE: 5MB
      MAX_REQUEST_SIZE: 5MB
    expose:
      - "8080"

  compreface-ui:
    image: exadel/compreface-fe:1.2.0
    container_name: compreface-ui
    restart: unless-stopped
    depends_on:
      compreface-api:
        condition: service_started
      compreface-admin:
        condition: service_started
    environment:
      CLIENT_MAX_BODY_SIZE: 5M
      PROXY_READ_TIMEOUT: 60s
      PROXY_CONNECT_TIMEOUT: 10s
    # Ops-only admin UI for the one-time API-key setup. Remove this `ports` block
    # to keep CompreFace entirely off the host network.
    ports:
      - "${COMPREFACE_ADMIN_UI_PORT:-8010}:80"

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${GATEWAY_PORT}
      <<: *db-env
      IDENTITY_SERVICE_URL: http://identity-service:${IDENTITY_SERVICE_PORT}
      LEADS_SERVICE_URL: http://leads-service:${LEADS_SERVICE_PORT}
      META_SERVICE_URL: http://meta-conversion-api:${META_SERVICE_PORT}
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:${NOTIFICATIONS_SERVICE_PORT}
      COMMUNICATION_SERVICE_URL: http://communication-service:${COMMUNICATION_SERVICE_PORT}
      ADMIN_SERVICE_URL: http://admin-service:${ADMIN_SERVICE_PORT}
      HR_SERVICE_URL: http://hr-service:${HR_SERVICE_PORT}
      TASKS_SERVICE_URL: http://tasks-service:${TASKS_SERVICE_PORT}
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_started
      leads-service:
        condition: service_started
      meta-conversion-api:
        condition: service_started
      notifications-service:
        condition: service_started
      communication-service:
        condition: service_started
      admin-service:
        condition: service_started
      hr-service:
        condition: service_started
      tasks-service:
        condition: service_started

  # ── Web apps (P4.3: one image per product, shared SSO) ────────────────────────
  # Each product UI is its own image. On localhost the browser shares the
  # fc_session cookie across ports (cookies ignore the port), so a login at
  # auth-web (3000) authenticates lms/hr/todo (3001-3003) with no re-login —
  # exactly the SSO behavior the subdomain deployment gets from COOKIE_DOMAIN.
  # The *_URL build args are the browser-facing origins baked into each bundle;
  # override them (and set COOKIE_DOMAIN + the caddy profile) to simulate the
  # real *.app.com topology. See the `caddy` service below and x-web-public-args.
  auth-web:
    build:
      context: .
      dockerfile: apps/auth-web/Dockerfile
      args: *web-public-args
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3000"
      API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

  lms-web:
    build:
      context: .
      dockerfile: apps/lms-web/Dockerfile
      args: *web-public-args
    restart: unless-stopped
    env_file: .env
    environment:
      API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
    ports:
      - "3001:3001"
    depends_on:
      - api-gateway

  hr-web:
    build:
      context: .
      dockerfile: apps/hr-web/Dockerfile
      args: *web-public-args
    restart: unless-stopped
    env_file: .env
    environment:
      API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
    ports:
      - "3002:3002"
    depends_on:
      - api-gateway

  todo-web:
    build:
      context: .
      dockerfile: apps/todo-web/Dockerfile
      args: *web-public-args
    restart: unless-stopped
    env_file: .env
    environment:
      API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
    ports:
      - "3003:3003"
    depends_on:
      - api-gateway

  lookup-admin:
    build:
      context: .
      dockerfile: apps/lookup-admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${GATEWAY_PORT}}
        API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3001"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${GATEWAY_PORT}}
      API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
    ports:
      - "3005:3001"
    depends_on:
      - api-gateway

  # Optional reverse proxy that fronts the four web apps on *.app.localhost
  # subdomains, faithfully simulating the production *.app.com topology (one
  # shared parent-domain cookie). Enable with `--profile sso-proxy` AND set in
  # .env: COOKIE_DOMAIN=.app.localhost, the NEXT_PUBLIC_*_URL to the http://
  # *.app.localhost origins, then rebuild. Add nothing to /etc/hosts — browsers
  # resolve *.localhost to loopback automatically.
  caddy:
    image: caddy:2-alpine
    profiles: ["sso-proxy"]
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - auth-web
      - lms-web
      - hr-web
      - todo-web

volumes:
  attendance-photos:
  compreface-postgres-data:
